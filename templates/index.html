
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GST Reconciliation Tool</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Font for better typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0b1f3a 0%, #1e3a5f 100%);
      color: #e0e6ed;
      font-family: 'Inter', sans-serif;
      padding: 40px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      background: linear-gradient(135deg, #142a45 0%, #1c3a5a 100%);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: #ffffff;
      margin-bottom: 20px;
      text-align: center;
      font-weight: 600;
    }

    label {
      margin-top: 15px;
      font-weight: 600;
      color: #b0c4de;
    }

    input[type="file"] {
      margin-top: 5px;
      padding: 10px;
      background-color: #1c2d4a;
      color: #ffffff;
      border: 1px solid #2c3e50;
      border-radius: 8px;
      width: 100%;
      transition: border-color 0.3s;
    }

    input[type="file"]:hover {
      border-color: #00d4ff;
    }

    button {
      margin-top: 25px;
      background: linear-gradient(135deg, #00d4ff 0%, #2e4a7b 100%);
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    #progress {
      margin-top: 15px;
      display: none;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }

    footer a {
      color: #00d4ff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2><i class="bi bi-file-earmark-spreadsheet"></i> GST Reconciliation Tool</h2>

    <form method="POST" action="/upload" enctype="multipart/form-data" onsubmit="showProgress()">
      <label for="gstr2b" data-bs-toggle="tooltip" title="Upload your GSTR-2B file in CSV or Excel format.">
        <i class="bi bi-file-earmark-text"></i> GSTR-2B File:
      </label>
      <input type="file" name="gstr2b" id="gstr2b" required aria-describedby="gstr2bHelp">

      <label for="purchase" data-bs-toggle="tooltip" title="Upload your Purchase file in CSV or Excel format.">
        <i class="bi bi-file-earmark-text"></i> Purchase File:
      </label>
      <input type="file" name="purchase" id="purchase" required aria-describedby="purchaseHelp">

      <button type="submit"><i class="bi bi-search"></i> Reconcile</button>
      <div id="progress" class="mt-3">
        <div class="progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
            <i class="bi bi-arrow-repeat"></i> Reconciling files… please wait.
          </div>
        </div>
      </div>
    </form>

    <footer>
      Website developed by <strong><a href="https://rankeryou.w3spaces.com/" target="_blank">Gajendra Maurya</a></strong>
    </footer>
  </div>

  <!-- Bootstrap JS for tooltips -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function showProgress() {
      document.getElementById('progress').style.display = 'block';
    }

    // Initialize tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
      return new bootstrap.Tooltip(tooltipTriggerEl);
    });
  </script>
</body>

</html>
